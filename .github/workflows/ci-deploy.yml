name: CI and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: whuang1101/odinbook-server

jobs:
  build-test-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - uses: docker/login-action@v3
        if: github.event_name == 'push'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        if: github.event_name == 'push'
        with:
          context: .
          push: true
          build-args: |
            BUILD_SHA=${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    needs: build-test-publish
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      VM_HOST: ${{ secrets.VM_HOST }}
      VM_USER: ${{ secrets.VM_USER || 'azureuser' }}
      VM_SSH_KEY: ${{ secrets.VM_SSH_KEY }}
    steps:
      - name: Skip deploy when SSH secrets are absent
        if: env.VM_HOST == '' || env.VM_SSH_KEY == ''
        run: echo "Skipping deploy because VM_HOST/VM_SSH_KEY secrets are not configured."
      - uses: appleboy/ssh-action@v1.2.0
        if: env.VM_HOST != '' && env.VM_SSH_KEY != ''
        with:
          host: ${{ env.VM_HOST }}
          username: ${{ env.VM_USER }}
          key: ${{ env.VM_SSH_KEY }}
          script: |
            set -e
            cd /opt/odinbook/src/OdinBook-server
            git fetch origin main
            git reset --hard origin/main
            cd /opt/odinbook
            docker compose build \
              --build-arg BUILD_SHA=${{ github.sha }} \
              --build-arg BUILD_TIME="${{ github.event.head_commit.timestamp }}" \
              server
            docker compose up -d server caddy
            for attempt in $(seq 1 30); do
              if docker compose exec -T server node -e "Promise.all([fetch('http://127.0.0.1:3000/health').then(r => { if (!r.ok) throw new Error('health failed'); }), fetch('http://127.0.0.1:3000/version').then(async r => { const v = await r.json(); if (!r.ok || v.commitSha !== '${{ github.sha }}' || !/^[a-f0-9]{64}$/.test(v.buildFingerprint)) throw new Error('version mismatch'); })]).then(() => process.exit(0)).catch(() => process.exit(1))"; then
                exit 0
              fi
              sleep 2
            done
            docker compose logs --tail=100 server
            exit 1
      - name: Verify public runtime fingerprint
        run: |
          node -e "fetch('https://odinbook-api.172.206.26.66.sslip.io/version').then(async r => { const v = await r.json(); if (!r.ok || v.commitSha !== '${{ github.sha }}' || !/^[a-f0-9]{64}$/.test(v.buildFingerprint)) process.exit(1); }).catch(() => process.exit(1))"

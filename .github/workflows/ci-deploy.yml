name: CI and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: whuang1101/odinbook-server

jobs:
  build-test-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - uses: docker/login-action@v3
        if: github.event_name == 'push'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        if: github.event_name == 'push'
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    needs: build-test-publish
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      VM_HOST: ${{ secrets.VM_HOST }}
      VM_USER: ${{ secrets.VM_USER || 'azureuser' }}
      VM_SSH_KEY: ${{ secrets.VM_SSH_KEY }}
    steps:
      - name: Skip deploy when SSH secrets are absent
        if: env.VM_HOST == '' || env.VM_SSH_KEY == ''
        run: echo "Skipping deploy because VM_HOST/VM_SSH_KEY secrets are not configured."
      - uses: appleboy/ssh-action@v1.2.0
        if: env.VM_HOST != '' && env.VM_SSH_KEY != ''
        with:
          host: ${{ env.VM_HOST }}
          username: ${{ env.VM_USER }}
          key: ${{ env.VM_SSH_KEY }}
          script: |
            set -e
            cd /opt/odinbook/src/OdinBook-server
            git fetch origin main
            git reset --hard origin/main
            cd /opt/odinbook
            docker compose up -d --build server caddy
            docker compose exec -T server node -e "fetch('http://localhost:3000/health').then(r => { if (!r.ok) process.exit(1); })"
